name: Deploy arXiv exponentials site

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    # Tuesday UTC, after the previous Monday-Sunday arXiv week is complete.
    - cron: "30 15 * * 2"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build static site data
        run: python scripts/build_exponentials_site.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/exponentials/data/series.json
          if git diff --cached --quiet; then
            echo "No refreshed data changed."
          else
            git commit -m "Refresh arXiv exponentials data [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/exponentials

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
